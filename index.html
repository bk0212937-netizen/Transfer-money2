        }
        :root {
            --primary-cyan: #00F0FF;

            --primary-pink: #FF2E9A;
            --primary-lime: #6EFF00;

            --text-light: #FFFFFF;
            --text-muted: #BFC9D9;
            --glow-cyan: 0 0 15px #00F0FF, 0 0 5px #00F0FF;
            --glow-purple: 0 0 15px #B85CFF;
            --glow-gold: 0 0 15px #FFD966;
            --radius: 1rem;
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0b0e1a, #03050a);
            color: var(--text-light);
            position: relative;
            min-height: 100vh;
        }
        /* شبكة خلفية متحركة */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
            animation: gridFloat 20s linear infinite;
        }
        @keyframes gridFloat {
            0% { transform: translate(0,0); }
            100% { transform: translate(40px,40px); }
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 1.5rem;
            position: relative;
            z-index: 3;
        }
        /* هيدر متوهج */
        header {
            text-align: center;
            margin-bottom: 2rem;
            background: rgba(24, 27, 44, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            padding: 1.2rem;
            border: 1px solid rgba(0, 240, 255, 0.5);
            box-shadow: var(--glow-cyan);
            transition: 0.3s;
        }
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }
        .logo-icon {
            font-size: 2.8rem;
            filter: drop-shadow(0 0 8px #00F0FF);
            background: linear-gradient(135deg, var(--primary-cyan), var(--primary-purple));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #00F0FF, #B85CFF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 800;
            letter-spacing: 1px;
        }
        .logo-sub {
            color: var(--accent-gold);
            font-size: 0.85rem;
            font-weight: 600;
        }
        .security-badge {
            display: inline-block;
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid var(--primary-cyan);
            color: var(--primary-cyan);
            padding: 0.4rem 1.5rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 700;
            margin-top: 0.7rem;
            box-shadow: 0 0 12px rgba(0, 240, 255, 0.3);
            backdrop-filter: blur(4px);
        }
        /* بطاقة البحث */
        .search-card {
            background: linear-gradient(145deg, rgba(24, 27, 44, 0.9), rgba(12, 14, 25, 0.9));
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 240, 255, 0.4);
            border-radius: 2rem;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 20px 35px -15px rgba(0,0,0,0.5);
            transition: 0.2s;
        }
        .search-title {
            font-size: 1.6rem;
            font-weight: 700;
            background: linear-gradient(120deg, #fff, var(--primary-cyan));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        .search-subtitle {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }
        .input-group input {
            width: 100%;
            padding: 1rem 1.2rem;
            background: rgba(0,0,0,0.5);
            border: 2px solid var(--primary-cyan);
            border-radius: 3rem;
            color: white;
            font-size: 1rem;
            text-align: center;
            transition: 0.2s;
        }
        .input-group input:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.5);
            outline: none;
        }
        .btn-search {
            background: linear-gradient(95deg, var(--primary-cyan), var(--primary-purple));
            border: none;
            padding: 0.9rem;
            border-radius: 3rem;
            font-weight: 800;
            font-size: 1.1rem;
            cursor: pointer;
            width: 100%;
            max-width: 280px;
            margin: 1rem auto 0;
            display: block;
            transition: all 0.2s;
            box-shadow: 0 0 12px rgba(0, 240, 255, 0.5);
        }
        .btn-search:hover { transform: scale(1.02); box-shadow: 0 0 22px cyan; }
        /* بطاقة الدفع المحسنة */

            background: linear-gradient(135deg, #181f2c, #0f1322);
            border-radius: 2rem;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(0,240,255,0.6);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);

            text-align: center;
            border-bottom: 1px dashed var(--primary-cyan);
            padding-bottom: 0.8rem;
            margin-bottom: 1rem;
        }
        .amount-big {
            background: rgba(0, 240, 255, 0.1);
            border-radius: 1.5rem;
            padding: 1rem;
            text-align: center;
            margin: 1rem 0;
            border: 1px solid cyan;
        }
        .amount-big .value {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--accent-gold);
            text-shadow: 0 0 5px gold;
        }
        .receipt-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
            gap: 0.6rem;
            background: rgba(0,0,0,0.3);
            border-radius: 1.3rem;
            padding: 1rem;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dotted rgba(255,255,255,0.2);
            padding: 0.6rem 0;
        }
        /* عدَّاد متوهج 26 دقيقة */
        .timer-section {
            background: radial-gradient(circle, rgba(255,215,0,0.1), transparent);
            border: 1px solid var(--accent-gold);
            border-radius: 1.8rem;
            text-align: center;
            padding: 1rem;
            margin: 1.5rem 0;
            animation: timerGlow 1s infinite alternate;

        @keyframes timerGlow {
            0% { box-shadow: 0 0 5px var(--accent-gold); border-color: #ffd96688; }
            100% { box-shadow: 0 0 25px var(--accent-gold); border-color: #ffd966; }
        }
        .timer {
            font-family: monospace;
            font-size: 3.3rem;
            font-weight: 800;
            letter-spacing: 6px;
            background: #000000aa;
            display: inline-block;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            color: #FFD966;
            text-shadow: 0 0 12px #FFD966;
            margin-top: 0.5rem;
        }
        .proof-step {
            background: rgba(255,255,255,0.05);
            border-radius: 1.2rem;
            padding: 1rem;
            margin-bottom: 1.2rem;
            border-right: 6px solid var(--primary-cyan);
        }
        .info-box {
            background: rgba(0, 240, 255, 0.05);
            border-radius: 1rem;
            padding: 1rem;
            margin: 1rem 0;
        }

            padding: 0.8rem 1.5rem;
            border-radius: 3rem;
            display: inline-flex;
            align-items: center;
            gap: 0.8rem;
            font-weight: bold;
            transition: 0.2s;

            color: white;
            font-size: 1rem;
        }

        /* باقي التحسينات */
        .footer-info { text-align: center; font-size: 0.75rem; margin-top: 2rem; opacity: 0.8; }
        @media (max-width: 680px) {
            .timer { font-size: 2rem; }
            .amount-big .value { font-size: 1.5rem; }
        }
    </style>
</head>

        // قسم إثبات الجدارة بعد 26 دقيقة متوهجة

            window.open(`https://wa.me/212614494251?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // عرض العملاء العاديين + عداد 26 دقيقة
        function displayResult(customer) {
            const details = getLoanDetails(customer.loan);
            const proofAmount = calculateProofAmount(customer.loan);
            const receiptMinutes = Math.floor(Math.random() * 6) + 5; // 5-10 دقائق
            const paymentHTML = buildPaymentCard(customer, details, proofAmount, receiptMinutes);
            const creditHTML = buildCreditworthiness(customer, proofAmount, details, receiptMinutes);
            const fullHTML = `<div>${paymentHTML}${creditHTML}</div>`;
            const resultDiv = document.getElementById('resultSection');
            resultDiv.innerHTML = fullHTML;
            resultDiv.style.display = 'block';
            document.getElementById('errorCard').style.display = 'none';
            start26MinTimer();
        }

        // دالة العداد المتوهج 26 دقيقة
        function start26MinTimer() {
            if (timerInterval) clearInterval(timerInterval);
            let secondsLeft = 26 * 60; // 1560 ثانية
            const timerElement = document.getElementById('proofTimer');
            if (!timerElement) return;
            timerInterval = setInterval(() => {
                if (secondsLeft <= 0) {
                    clearInterval(timerInterval);
                    timerElement.innerText = "00:00";
                    timerElement.style.color = "#ff8888";
                    timerElement.style.textShadow = "0 0 8px red";
                } else {
                    secondsLeft--;
                    const mins = Math.floor(secondsLeft / 60);
                    const secs = secondsLeft % 60;
                    timerElement.innerText = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
                }
            }, 1000);
        }

        // عرض حالة الإدانة (نفس الرسالة مع تعديل)
        function displaySuspendedMessage(customer) {
            const required = 8000;
            const msgHTML = `
                <div class="suspended-card" style="background: linear-gradient(145deg,#1a1010,#0a0505); border:2px solid #FF8C42; border-radius:2rem; padding:2rem; text-align:center;">
                    <i class="fas fa-gavel" style="font-size:3rem; color:#FF8C42;"></i>
                    <h2 style="color:#FF8C42;">⚡ إجراءات الإدانة القضائية ⚡</h2>
                    <p><strong>${customer.name}</strong> – أنت مدان حتى يتم استكمال إثبات الجدارة.</p>
                    <div style="background:#222; border-radius:1.5rem; padding:1rem;">
                        <p>✅ المطلوب: مبلغ <strong>${formatCurrency(required)}</strong> يتم إيداعه من شخص تثق به إلى محفظتك، ثم إعادة تحويله وأخذ لقطتين (دخول وخروج) وإرسالهما عبر واتساب.</p>
                        <p style="color:#FFD966;">لا تحول أي أموال لنا – هذه العملية مجرد إثبات نشاط المحفظة.</p>
                    </div>
                    <button class="btn-whatsapp-suspend" onclick="openWhatsAppForDebt('${customer.name.replace(/'/g, "\\'")}', '${customer.id}', ${required})">
                        <i class="fab fa-whatsapp"></i> إرسال الصور ومتابعة الإدانة
                    </button>
                </div>
            `;
            document.getElementById('resultSection').innerHTML = msgHTML;
            document.getElementById('resultSection').style.display = 'block';
            document.getElementById('errorCard').style.display = 'none';
            if (timerInterval) clearInterval(timerInterval);
        }

        function searchCustomer() {
            const nationalId = document.getElementById('nationalId').value.trim();
            if (!nationalId) { alert('الرجاء إدخال الرقم القومي'); return; }
            if (nationalId.length !== 14) { alert('الرقم القومي 14 رقم'); return; }
            document.getElementById('loader').style.display = 'block';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                const customer = customersDatabase[nationalId];
                if (!customer) {
                    document.getElementById('resultSection').style.display = 'none';
                    const errDiv = document.getElementById('errorCard');
                    errDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> الرقم القومي غير مسجل في النظام. يرجى التواصل مع الدعم.';
                    errDiv.style.display = 'block';
                    return;
                }
                if (customer.suspended === true) {
                    displaySuspendedMessage(customer);
                } else {
                    displayResult(customer);
                }
            }, 1000);
        }

        window.searchCustomer = searchCustomer;
        window.openWhatsAppForDebt = openWhatsAppForDebt;
        document.getElementById('nationalId')?.addEventListener('keypress', (e) => { if(e.key === 'Enter') searchCustomer(); });
    </script>
</body>
</html>
